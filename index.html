<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐍 Snake Game</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .skin-selector { display:flex; gap:8px; justify-content:center; margin:8px 0; flex-wrap:wrap; }
    .skin-btn { padding:4px 10px; border:2px solid #555; border-radius:20px; background:#1a1a2e; color:#ccc; cursor:pointer; font-size:12px; transition:all 0.2s; }
    .skin-btn.active, .skin-btn:hover { border-color:#4ecca3; color:#4ecca3; }
    .skin-btn[data-skin="fire"].active { border-color:#ff6b35; color:#ff6b35; }
    .skin-btn[data-skin="ice"].active { border-color:#00d4ff; color:#00d4ff; }
    .skin-btn[data-skin="neon"].active { border-color:#ff00ff; color:#ff00ff; }
    .skin-btn[data-skin="gold"].active { border-color:#ffd700; color:#ffd700; }
    #combo { color:#ffd700; font-weight:bold; font-size:13px; min-height:18px; text-align:center; }
    @keyframes floatUp { from{opacity:1;transform:translateY(0)} to{opacity:0;transform:translateY(-40px)} }
    #ai-banner { text-align:center; font-size:11px; color:#4ecca3; opacity:0.7; margin-top:4px; }
    #game-over-art { display:block; margin:8px auto; border-radius:8px; width:80px; height:80px; object-fit:cover; }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="header">
      <h1>🐍 Snake Game</h1>
      <div id="score-board">
        <span>Score: <span id="score">0</span></span>
        <span>High Score: <span id="high-score">0</span></span>
        <span>Level: <span id="level">1</span></span>
      </div>
      <div id="combo"></div>
    </div>
    <div class="skin-selector">
      <button class="skin-btn active" data-skin="classic">🟢 Classic</button>
      <button class="skin-btn" data-skin="fire">🔥 Fire</button>
      <button class="skin-btn" data-skin="ice">❄️ Ice</button>
      <button class="skin-btn" data-skin="neon">💜 Neon</button>
      <button class="skin-btn" data-skin="gold">⭐ Gold</button>
    </div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div id="ai-banner">🎨 Backgrounds powered by Pollinations AI</div>
    <div id="controls">
      <button id="startBtn">Start Game</button>
      <button id="pauseBtn" disabled>Pause</button>
      <button id="restartBtn" disabled>Restart</button>
    </div>
    <div id="instructions">
      <p>Arrow keys / WASD to move &nbsp;|&nbsp; ⭐ Golden food = 50× bonus!</p>
      <p>Quick combos multiply your score. Choose a skin above!</p>
    </div>
  </div>
  <div id="game-over-modal" class="hidden">
    <div class="modal-content">
      <h2>Game Over!</h2>
      <img id="game-over-art" src="" alt="AI Game Over Art" style="display:none">
      <p>Your Score: <span id="final-score">0</span></p>
      <button id="playAgainBtn">Play Again</button>
    </div>
  </div>
  <script src="pollinations.js"></script>
  <script src="particles.js"></script>
  <script src="sounds.js"></script>
  <script src="touch.js"></script>
  <script src="game.js"></script>
  <script>
    // Inject AI background into canvas when skin changes
    document.querySelectorAll('.skin-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const skin = btn.dataset.skin;
        const canvas = document.getElementById('gameCanvas');
        if (skinImages[skin]) {
          // Store for game.js to draw as background
          window.currentBgImage = skinImages[skin];
        } else {
          loadPollinationsImage(skinPrompts[skin] || 'pixel art game background', 400, 400, 42)
            .then(img => { skinImages[skin] = img; window.currentBgImage = img; });
        }
      });
    });

    // Show AI art on game over
    const origShowGameOver = window.showGameOver;
    document.addEventListener('gameover', async (e) => {
      const score = e.detail ? e.detail.score : parseInt(document.getElementById('final-score').textContent) || 0;
      const activeSkin = document.querySelector('.skin-btn.active')?.dataset.skin || 'classic';
      const artEl = document.getElementById('game-over-art');
      artEl.style.display = 'block';
      artEl.src = getPollinationsUrl(`defeated pixel art snake, game over, score ${score}, ${activeSkin} theme`, 80, 80, score);
    });
  </script>
</body>
</html>
